name: OCI Instance Provisioner Loop

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *' # Runs automatically every 15 minutes
  push:
    branches:
      - main

jobs:
  provision:
    runs-on: ubuntu-latest
    name: Run Capacity Provisioner Loop
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, openssl, mbstring

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress --optimize-autoloader

      # 1. Creates the physical private key file safely
      - name: Create Private Key File
        run: |
          cat << 'EOF' > oci_private_key.pem
          ${{ secrets.OCI_PRIVATE_KEY || vars.OCI_PRIVATE_KEY }}
          EOF
          chmod 600 oci_private_key.pem

      # 2. Generates the .env file with strict double quotes to prevent whitespace parser failures
      - name: Generate Local .env File
        run: |
          cat << 'EOF' > .env
          OCI_REGION="${{ secrets.OCI_REGION || vars.OCI_REGION }}"
          OCI_USER_ID="${{ secrets.OCI_USER_OCID || vars.OCI_USER_OCID }}"
          OCI_TENANCY_ID="${{ secrets.OCI_TENANCY_OCID || vars.OCI_TENANCY_OCID }}"
          OCI_KEY_FINGERPRINT="${{ secrets.OCI_FINGERPRINT || vars.OCI_FINGERPRINT }}"
          OCI_PRIVATE_KEY_FILENAME="oci_private_key.pem"
          OCI_COMPARTMENT_OCID="${{ secrets.OCI_COMPARTMENT_OCID || vars.OCI_COMPARTMENT_OCID }}"
          COMPARTMENT_OCID="${{ secrets.OCI_COMPARTMENT_OCID || vars.OCI_COMPARTMENT_OCID }}"
          
          OCI_IMAGE_ID="${{ secrets.OCI_IMAGE_ID || vars.OCI_IMAGE_ID }}"
          OCI_OCPUS="${{ secrets.OCI_OCPUS || vars.OCI_OCPUS }}"
          OCI_MEMORY_IN_GBS="${{ secrets.OCI_MEMORY_IN_GBS || vars.OCI_MEMORY_IN_GBS }}"
          OCI_SHAPE="${{ secrets.OCI_SHAPE || vars.OCI_SHAPE }}"
          OCI_MAX_INSTANCES="${{ secrets.OCI_MAX_INSTANCES || vars.OCI_MAX_INSTANCES }}"
          OCI_SSH_PUBLIC_KEY="${{ secrets.OCI_SSH_PUBLIC_KEY || vars.OCI_SSH_PUBLIC_KEY }}"
          
          TELEGRAM_USER_ID="${{ secrets.TELEGRAM_USER_ID || vars.TELEGRAM_USER_ID }}"
          TELEGRAM_BOT_API_KEY="${{ secrets.TELEGRAM_BOT_API_KEY || vars.TELEGRAM_BOT_API_KEY }}"
          OCI_AVAILABILITY_DOMAIN="${{ secrets.OCI_AVAILABILITY_DOMAIN || vars.OCI_AVAILABILITY_DOMAIN }}"
          OCI_SUBNET_ID="${{ secrets.OCI_SUBNET_ID || vars.OCI_SUBNET_ID }}"
          EOF

      # 3. Executes the script cleanly
      - name: Execute Provisioner Script
        run: php index.php
