name: OCI Instance Provisioner Loop
on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *' # Runs automatically every 15 minutes
  push:
    branches:
      - main

jobs:
  provision:
    runs-on: ubuntu-latest
    name: Run Capacity Provisioner Loop
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, openssl, mbstring

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress --optimize-autoloader

      - name: Create Private Key File
        run: |
          cat << 'EOF' > oci_private_key.pem
          ${{ secrets.OCI_PRIVATE_KEY || vars.OCI_PRIVATE_KEY }}
          EOF
          chmod 600 oci_private_key.pem

      - name: Generate Local .env File
        run: |
          cat << 'EOF' > .env
          OCI_REGION="sa-bogota-1"
          OCI_USER_ID="${{ secrets.OCI_USER_OCID || vars.OCI_USER_OCID }}"
          OCI_TENANCY_ID="ocid1.tenancy.oc1..aaaaaaaar2wm6lvli54b7tkzvu3vwnftuekuavabdgzhdfyd323slbuo7b7a"
          OCI_KEY_FINGERPRINT="${{ secrets.OCI_FINGERPRINT || vars.OCI_FINGERPRINT }}"
          OCI_PRIVATE_KEY_FILENAME="oci_private_key.pem"
          OCI_IMAGE_ID="ocid1.image.oc1.sa-bogota-1.aaaaaaaaamazzndcgdip6ca3nh5krclvupqn65x23wif6kr3hbm3zbcplc7q"
          OCI_OCPUS="4"
          OCI_MEMORY_IN_GBS="24"
          OCI_SHAPE="VM.Standard.A1.Flex"
          OCI_MAX_INSTANCES="1"
          OCI_SSH_PUBLIC_KEY="${{ secrets.OCI_SSH_PUBLIC_KEY || vars.OCI_SSH_PUBLIC_KEY }}"
          TELEGRAM_USER_ID="${{ secrets.TELEGRAM_USER_ID || vars.TELEGRAM_USER_ID }}"
          TELEGRAM_BOT_API_KEY="${{ secrets.TELEGRAM_BOT_API_KEY || vars.TELEGRAM_BOT_API_KEY }}"
          OCI_AVAILABILITY_DOMAIN="${{ secrets.OCI_AVAILABILITY_DOMAIN || vars.OCI_AVAILABILITY_DOMAIN }}"
          OCI_SUBNET_ID="${{ secrets.OCI_SUBNET_ID || vars.OCI_SUBNET_ID }}"
          EOF

      # DIAGNOSTIC: prints the PHP that handles tenancy/compartment (remove once fixed)
      - name: Dump Config + OciApi internals
        run: |
          echo "===== Config class (constructor + property assignment) ====="
          find . -path ./vendor -prune -o -name "Config.php" -print | grep -v vendor | while read f; do
            echo "--- $f ---"
            grep -n "tenancy\|compartment\|function __construct\|public \$\|private \$\|protected \$" "$f"
          done
          echo ""
          echo "===== index.php lines 1-55 ====="
          sed -n '1,55p' index.php
          echo ""
          echo "===== src/OciApi.php lines 40-135 ====="
          sed -n '40,135p' src/OciApi.php

      - name: Execute Provisioner Script
        env:
          OCI_REGION: "sa-bogota-1"
          OCI_USER_ID: "${{ secrets.OCI_USER_OCID || vars.OCI_USER_OCID }}"
          OCI_TENANCY_ID: "ocid1.tenancy.oc1..aaaaaaaar2wm6lvli54b7tkzvu3vwnftuekuavabdgzhdfyd323slbuo7b7a"
          OCI_KEY_FINGERPRINT: "${{ secrets.OCI_FINGERPRINT || vars.OCI_FINGERPRINT }}"
          OCI_PRIVATE_KEY_FILENAME: "oci_private_key.pem"
          OCI_IMAGE_ID: "ocid1.image.oc1.sa-bogota-1.aaaaaaaaamazzndcgdip6ca3nh5krclvupqn65x23wif6kr3hbm3zbcplc7q"
          OCI_OCPUS: "4"
          OCI_MEMORY_IN_GBS: "24"
          OCI_SHAPE: "VM.Standard.A1.Flex"
          OCI_MAX_INSTANCES: "1"
          OCI_SSH_PUBLIC_KEY: "${{ secrets.OCI_SSH_PUBLIC_KEY || vars.OCI_SSH_PUBLIC_KEY }}"
          TELEGRAM_USER_ID: "${{ secrets.TELEGRAM_USER_ID || vars.TELEGRAM_USER_ID }}"
          TELEGRAM_BOT_API_KEY: "${{ secrets.TELEGRAM_BOT_API_KEY || vars.TELEGRAM_BOT_API_KEY }}"
          OCI_AVAILABILITY_DOMAIN: "${{ secrets.OCI_AVAILABILITY_DOMAIN || vars.OCI_AVAILABILITY_DOMAIN }}"
          OCI_SUBNET_ID: "${{ secrets.OCI_SUBNET_ID || vars.OCI_SUBNET_ID }}"
        run: php index.php
